# cloudbuild.yaml — TerraVault automatic deploy to Cloud Run.
#
# Run by the "terravault-deploy" Cloud Build trigger on every push to master
# (created by scripts/gcp_bootstrap.sh). Build the image, push it to Artifact
# Registry, then roll a new Cloud Run revision wired to Cloud SQL and Secret
# Manager. Database migrations run from the container entrypoint on startup.
#
# Manual run (first deploy or ad-hoc):
#   gcloud builds submit --config=cloudbuild.yaml .

timeout: 1200s

substitutions:
  _REGION: us-central1
  _SERVICE: terravault-api
  _REPO: terravault
  _SQL_INSTANCE: terravault-pg
  _RUNTIME_SA_ID: terravault-run

options:
  # Avoids the "build needs a logs bucket" failure mode on fresh projects.
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1) Build. Pull the previous :latest first so unchanged layers are reused.
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        IMG="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"
        docker pull "$$IMG:latest" || true
        docker build \
          --cache-from "$$IMG:latest" \
          -t "$$IMG:$BUILD_ID" \
          -t "$$IMG:latest" \
          .

  # 2) Push both tags. Must precede deploy so the immutable tag exists.
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # 3) Deploy the immutable $BUILD_ID tag to Cloud Run.
  #    - Cloud SQL reached via the built-in connector (unix socket), no VPC.
  #    - Secrets injected from Secret Manager; never baked into the image.
  #    - REDIS_URL=memory:// -> slowapi uses in-process rate limiting (no Redis).
  #    - TRUSTED_HOSTS/CORS scoped to *.run.app + the configured frontend domain.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SA_ID}@$PROJECT_ID.iam.gserviceaccount.com
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}
      - --port=8080
      - --cpu=1
      - --memory=1Gi
      - --min-instances=0
      - --max-instances=3
      - --concurrency=40
      - --timeout=60
      - --allow-unauthenticated
      - --set-secrets=TERRAVAULT_API_KEY_HASH=terravault-api-key-hash:latest,TERRAVAULT_DATABASE_URL=terravault-database-url:latest
      - --set-env-vars=^##^TERRAVAULT_ENVIRONMENT=production##TERRAVAULT_API_HOST=0.0.0.0##TERRAVAULT_API_PORT=8080##TERRAVAULT_LOG_LEVEL=INFO##TERRAVAULT_LOG_FORMAT=json##TERRAVAULT_DEBUG=false##TERRAVAULT_REDIS_URL=memory://##TERRAVAULT_API_TRUSTED_HOSTS=["*.run.app","terravault-oguarni.duckdns.org"]##TERRAVAULT_API_CORS_ORIGINS=["https://terravault-oguarni.duckdns.org"]
