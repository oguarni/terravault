# Pre-commit hooks for TerraSafe
repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.10

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--ignore=E226,E402,E501,W503,W504"]

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-r", "terrasafe/", "--ini", ".bandit", "-ll"]
        exclude: ^test_

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets

  # Terraform file validation
  - repo: local
    hooks:
      - id: terrasafe-scan
        name: TerraSafe Security Scan
        entry: python -m terrasafe.cli
        language: system
        files: \.tf$
        pass_filenames: true

  # Frontend linting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: 'v8.56.0'
    hooks:
      - id: eslint
        args: ["--no-eslintrc", "--env", "browser", "--parser-options=ecmaVersion:latest"]
        files: ^frontend/js/.*\.js$

  # Frontend formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: 'v3.1.0'
    hooks:
      - id: prettier
        types_or: [javascript, html, css]
        files: ^frontend/
