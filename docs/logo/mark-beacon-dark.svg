<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="TerraVault security scanner">
  <title>TerraVault — infrastructure security scanner (dark UI variant)</title>
  <defs>
    <!-- Scan signal for dark surfaces: navy lifted to steel (so the cool end stays legible) into terminal green (rings only) -->
    <linearGradient id="scan-signal-dark" gradientUnits="userSpaceOnUse" x1="96" y1="96" x2="160" y2="160">
      <stop offset="0" stop-color="#4E77B0"/>
      <stop offset="1" stop-color="#00E676"/>
    </linearGradient>
  </defs>
  <!-- Scan axis: light structural line, behind the rings, pierces the frame -->
  <line x1="6" y1="128" x2="250" y2="128" stroke="#F1F5FB" stroke-width="3" stroke-linecap="round"/>
  <!-- Hexagon frame: regular pointy-top hexagon (HashiCorp mark geometry), R=108 -->
  <path d="M 137.53 25.5 L 212.01 68.5 Q 221.53 74 221.53 85 L 221.53 171 Q 221.53 182 212.01 187.5 L 137.53 230.5 Q 128 236 118.47 230.5 L 43.99 187.5 Q 34.47 182 34.47 171 L 34.47 85 Q 34.47 74 43.99 68.5 L 118.47 25.5 Q 128 20 137.53 25.5 Z" fill="none" stroke="#F1F5FB" stroke-width="12" stroke-linejoin="round"/>
  <!-- Scanner rings: steel->green signal gradient (exclusive) -->
  <circle cx="128" cy="128" r="46" fill="none" stroke="url(#scan-signal-dark)" stroke-width="3.2"/>
  <circle cx="128" cy="128" r="33" fill="none" stroke="url(#scan-signal-dark)" stroke-width="3.6"/>
  <circle cx="128" cy="128" r="20" fill="none" stroke="url(#scan-signal-dark)" stroke-width="3.6"/>
  <!-- Beacon core: solid terminal-green with a soft flat halo -->
  <circle cx="128" cy="128" r="15" fill="#00E676" fill-opacity="0.18"/>
  <circle cx="128" cy="128" r="8.5" fill="#00E676"/>
</svg>
