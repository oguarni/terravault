# docker-compose.yml - Production-ready multi-service setup for TerraVault

services:
  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: terravault-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 320M
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - terravault-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL for persistent storage
  postgres:
    image: postgres:15-alpine
    container_name: terravault-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=terravault
      - POSTGRES_USER=terravault_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - terravault-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terravault_user -d terravault"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Server (Main Application)
  terravault-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: terravault-api:latest
    container_name: terravault-api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./models:/app/models:ro
    env_file:
      - .env
    environment:
      # API Configuration
      - TERRAVAULT_API_HOST=0.0.0.0
      - TERRAVAULT_API_PORT=8000
      # API Key Hash (loaded from .env file via env_file directive)
      - TERRAVAULT_API_KEY_HASH=${TERRAVAULT_API_KEY_HASH}

      # Redis Configuration
      - TERRAVAULT_REDIS_URL=redis://redis:6379
      - TERRAVAULT_REDIS_MAX_CONNECTIONS=50

      # Database Configuration
      - TERRAVAULT_DATABASE_URL=postgresql+asyncpg://terravault_user:${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}@postgres:5432/terravault

      # Security Configuration
      - TERRAVAULT_MAX_FILE_SIZE_MB=10
      - TERRAVAULT_SCAN_TIMEOUT_SECONDS=30
      - TERRAVAULT_RATE_LIMIT_REQUESTS=100
      - TERRAVAULT_RATE_LIMIT_WINDOW_SECONDS=60

      # Environment
      - TERRAVAULT_ENVIRONMENT=production
      - TERRAVAULT_LOG_LEVEL=INFO
      - TERRAVAULT_LOG_FORMAT=json
      - TERRAVAULT_DEBUG=false

      # CORS + TrustedHost — both pulled from .env (JSON arrays). See .env.example.
      - TERRAVAULT_API_CORS_ORIGINS=${TERRAVAULT_API_CORS_ORIGINS:-["http://localhost:3000"]}
      - TERRAVAULT_API_TRUSTED_HOSTS=${TERRAVAULT_API_TRUSTED_HOSTS:-["localhost","127.0.0.1"]}
    networks:
      - terravault-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Caddy reverse proxy — terminates TLS via Let's Encrypt, fronts the API
  caddy:
    image: caddy:2-alpine
    container_name: terravault-caddy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - TERRAVAULT_PUBLIC_DOMAIN=${TERRAVAULT_PUBLIC_DOMAIN:-localhost}
    networks:
      - terravault-network
    depends_on:
      terravault-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus for metrics collection
  prometheus:
    # Pinned (was :latest) for reproducible deploys; v2.53 is the current LTS line.
    image: prom/prometheus:v2.53.3
    container_name: terravault-prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - terravault-network
    depends_on:
      - terravault-api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana for visualization
  grafana:
    # Pinned (was :latest) for reproducible deploys.
    image: grafana/grafana:11.3.1
    container_name: terravault-grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
    networks:
      - terravault-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  terravault-network:
    driver: bridge
    name: terravault-network

volumes:
  redis_data:
    name: terravault-redis-data
  postgres_data:
    name: terravault-postgres-data
  prometheus_data:
    name: terravault-prometheus-data
  grafana_data:
    name: terravault-grafana-data
  caddy_data:
    name: terravault-caddy-data
  caddy_config:
    name: terravault-caddy-config
