# Cloud Run environment for the terravault-api service (non-secret values only).
#
# Consumed by:  gcloud run deploy --env-vars-file=deploy/cloudrun/env.yaml
# The API key HASH is intentionally NOT here — it is injected from Secret Manager
# via --set-secrets (see README.md). Never put the hash or any secret in this file.

# Production posture: TrustedHost + CORS enforced, docs default off (re-enabled below).
TERRAVAULT_ENVIRONMENT: "production"

# Cloud Run routes traffic to the container's $PORT on all interfaces; bind 0.0.0.0.
TERRAVAULT_API_HOST: "0.0.0.0"

# Empty = use in-memory rate limiting (no Redis). Cloud Run is stateless and has no
# Redis; an empty URL makes slowapi fall back to per-instance in-memory storage.
TERRAVAULT_REDIS_URL: ""

# Serve the bundled static SPA from this same container, replacing Caddy's static
# role. The SPA calls window.location.origin, so same-origin serving needs no CORS.
TERRAVAULT_SERVE_FRONTEND: "true"

# Host allow-list (JSON array). *.run.app covers the default Cloud Run URL. Add any
# custom domain here after you map it.
TERRAVAULT_API_TRUSTED_HOSTS: '["*.run.app"]'

# CORS origins (JSON array). "*" is safe here because the API sets
# allow_credentials=False. Tighten to your real frontend origin if you split hosting.
TERRAVAULT_API_CORS_ORIGINS: '["*"]'

# Publish Swagger UI at /docs for the portfolio. Set to "false" to hide it.
TERRAVAULT_ENABLE_DOCS: "true"

# Structured logs so Cloud Logging parses them into fields.
TERRAVAULT_LOG_LEVEL: "INFO"
TERRAVAULT_LOG_FORMAT: "json"
