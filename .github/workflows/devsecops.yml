name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop, master ]
    # A .ratchet.json-only commit comes from the ratchet-bump job below;
    # ignore it so the bot's baseline commit cannot re-trigger the pipeline.
    paths-ignore:
      - '.ratchet.json'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: write
  security-events: write

# On a PR, supersede in-flight runs when new commits are pushed. On master
# pushes keep cancel-in-progress off so ratchet-bump / deploy-staging are not
# interrupted mid-run.
concurrency:
  group: devsecops-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    # SAST - Static Application Security Testing
    - name: Run Bandit (SAST)
      id: bandit
      run: |
        pip install bandit
        set +e
        bandit -r terravault/ --ini .bandit -f json -o bandit-report.json
        echo "bandit_exit=$?" >> "$GITHUB_OUTPUT"
        bandit -r terravault/ --ini .bandit -ll -f screen
        exit 0

    # Dependency vulnerability scanning
    - name: Safety Check
      id: safety
      run: |
        # Pin safety: 3.7.0 changed the CLI so `--output` is a format, not a
        # file path. Use --save-json to write the report; pin to stop the
        # invocation drifting again on the next upstream release.
        pip install 'safety==3.7.0'
        set +e
        safety check --save-json safety-report.json
        echo "safety_exit=$?" >> "$GITHUB_OUTPUT"
        exit 0

    # Secret detection — produce SARIF for the consolidated report
    - name: Install gitleaks
      run: |
        curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
          | tar -xz -C /tmp gitleaks
        sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

    - name: Run gitleaks (SARIF)
      id: gitleaks
      run: |
        set +e
        gitleaks detect \
          --source . \
          --redact \
          --report-format sarif \
          --report-path gitleaks-results.sarif \
          --exit-code 0
        echo "gitleaks_exit=$?" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Upload security artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
          gitleaks-results.sarif
        if-no-files-found: warn

    - name: Enforce security thresholds
      run: |
        # bandit/gitleaks: any finding fails the job
        # safety: known CVEs fail the job
        BANDIT_EXIT="${{ steps.bandit.outputs.bandit_exit }}"
        SAFETY_EXIT="${{ steps.safety.outputs.safety_exit }}"
        GITLEAKS_EXIT="${{ steps.gitleaks.outputs.gitleaks_exit }}"
        FAIL=0
        if [ "$BANDIT_EXIT"   != "0" ]; then echo "::error::Bandit findings detected";   FAIL=1; fi
        if [ "$SAFETY_EXIT"   != "0" ]; then echo "::error::Safety findings detected";   FAIL=1; fi
        # gitleaks --exit-code 0 always exits 0; detect findings from SARIF
        if [ -f gitleaks-results.sarif ]; then
          FOUND=$(python -c "import json,sys; d=json.load(open('gitleaks-results.sarif')); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))")
          if [ "$FOUND" -gt 0 ]; then echo "::error::gitleaks: $FOUND secret(s) detected"; FAIL=1; fi
        fi
        exit $FAIL

  # Unit and integration tests
  test:
    runs-on: ubuntu-latest
    needs: security-scan
    if: always()
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests
      env:
        TERRAVAULT_API_KEY_HASH: "$2b$12$LJ3m9ZkRjWyEbhMxBqXvkuN/3QlGYbTEwHqMFEVBBxkLpN0uWxjAq"
        TERRAVAULT_ENVIRONMENT: "development"
        TERRAVAULT_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
        TERRAVAULT_REDIS_URL: "redis://localhost:6379"
        TERRAVAULT_LOG_LEVEL: "INFO"
      run: |
        pytest -v --cov=terravault --cov-report=xml --junit-xml=pytest-junit.xml

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports
        path: |
          pytest-junit.xml
          coverage.xml
        if-no-files-found: warn

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  # Integration tests with actual scanning
  integration-scan:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Run TerraVault composite action on test_files/
      id: terravault
      uses: ./.github/actions/terravault-scan
      with:
        terraform_dir: test_files
        threshold: "70"
        fail_on_high_risk: "false"
        github_token: ${{ secrets.GITHUB_TOKEN }}
        scan_changed_only: "false"
        post_comment: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('terravault-results.sarif') != ''
      continue-on-error: true
      with:
        sarif_file: terravault-results.sarif
        category: terravault-integration

    - name: Archive scan results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: scan-results
        path: |
          scan_output.json
          terravault-results.sarif
          scan_errors.log
        if-no-files-found: warn

  # Docker security and build
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
    - uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Build Docker image
      run: |
        docker build -t terravault:${{ github.sha }} .

    - name: Run Trivy on Docker image
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
      with:
        image-ref: 'terravault:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Archive Trivy SARIF for pipeline report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: docker-reports
        path: trivy-results.sarif
        if-no-files-found: warn

    - name: Test Docker container
      run: |
        docker run --rm -v $(pwd)/test_files:/app/test_files \
          terravault:${{ github.sha }} \
          python -m terravault.cli test_files/secure.tf

  # Consolidated AI-readable pipeline report
  pipeline-report:
    name: Consolidated Pipeline Report
    runs-on: ubuntu-latest
    needs: [security-scan, test, integration-scan, docker]
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      overall_status: ${{ steps.report.outputs.overall_status }}
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: _artifacts/

      - name: Inspect downloaded artifacts
        run: |
          echo "=== Artifact tree ==="
          find _artifacts -type f -maxdepth 3 -print

      - name: Generate consolidated report
        id: report
        run: |
          set +e
          python scripts/pipeline_report.py \
            --input bandit-json=_artifacts/security-reports/bandit-report.json \
            --input safety-json=_artifacts/security-reports/safety-report.json \
            --input gitleaks-sarif=_artifacts/security-reports/gitleaks-results.sarif \
            --input pytest-junit=_artifacts/test-reports/pytest-junit.xml \
            --input coverage-xml=_artifacts/test-reports/coverage.xml \
            --input terravault-scan=_artifacts/scan-results/scan_output.json \
            --input terravault-sarif=_artifacts/scan-results/terravault-results.sarif \
            --input trivy-sarif=_artifacts/docker-reports/trivy-results.sarif \
            --output-md pipeline-report.md \
            --output-json pipeline-metrics.json \
            --title "DevSecOps Pipeline Report" \
            --commit "${{ github.event.pull_request.head.sha }}" \
            --pr "${{ github.event.pull_request.number }}"
          rc=$?
          OVERALL=$(python -c "import json; print(json.load(open('pipeline-metrics.json'))['overall'])")
          echo "overall_status=$OVERALL" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Upload consolidated pipeline report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-report
          path: |
            pipeline-report.md
            pipeline-metrics.json
          retention-days: 14

      - name: Comment on PR with consolidated report
        if: always()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const overall = '${{ steps.report.outputs.overall_status }}';
            const passed = overall === 'pass';
            const report = fs.existsSync('pipeline-report.md')
              ? fs.readFileSync('pipeline-report.md', 'utf8')
              : '_Pipeline report file was not produced — see workflow logs._';
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const hint = passed
              ? ''
              : (labels.includes('auto-fix')
                  ? '\n\n🤖 The `auto-fix` label is set — Claude will attempt remediation of bandit/safety/pytest findings (gitleaks and Trivy require human review).'
                  : '\n\n💡 Add the `auto-fix` label to let Claude attempt remediation (bandit/safety/pytest only; max 3 attempts).');
            const marker = '<!-- devsecops-pipeline-report -->';
            const body = `${marker}\n## ${passed ? '✅' : '❌'} DevSecOps Pipeline ${passed ? 'passed' : 'failed'}\n\n${report}${hint}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # Claude self-correction for DevSecOps pipeline failures
  devsecops-auto-fix:
    name: Claude DevSecOps Auto-Fix
    needs: pipeline-report
    if: |
      always() &&
      needs.pipeline-report.outputs.overall_status == 'fail' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'auto-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Compute attempt counter
        id: limits
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const prior = commits.filter(c =>
              c.commit.message.startsWith('chore(devsecops):')
            );
            const attempt = prior.length + 1;
            const MAX = 3;
            core.setOutput('attempt', String(attempt));
            core.setOutput('max', String(MAX));
            core.setOutput('proceed', String(attempt <= MAX));
            if (attempt > MAX) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `🛑 DevSecOps auto-fix attempt limit (${MAX}) reached. Review the consolidated pipeline report manually and remove the \`auto-fix\` label when ready to retry.`,
              });
            }

      - name: Checkout PR branch (writable)
        if: steps.limits.outputs.proceed == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.AUTO_FIX_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        if: steps.limits.outputs.proceed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: steps.limits.outputs.proceed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install bandit 'safety==3.7.0'

      - name: Download consolidated report
        if: steps.limits.outputs.proceed == 'true'
        uses: actions/download-artifact@v8
        with:
          name: pipeline-report
          path: .

      - name: Configure git identity for bot
        if: steps.limits.outputs.proceed == 'true'
        run: |
          git config user.name  "claude-devsecops-fix[bot]"
          git config user.email "claude-devsecops-fix[bot]@users.noreply.github.com"

      - name: Run Claude DevSecOps auto-fix
        if: steps.limits.outputs.proceed == 'true'
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1
        env:
          TERRAVAULT_API_KEY_HASH: "$2b$12$LJ3m9ZkRjWyEbhMxBqXvkuN/3QlGYbTEwHqMFEVBBxkLpN0uWxjAq"
          TERRAVAULT_ENVIRONMENT: development
          TERRAVAULT_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          TERRAVAULT_REDIS_URL: "redis://localhost:6379"
          TERRAVAULT_LOG_LEVEL: INFO
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          ATTEMPT: ${{ steps.limits.outputs.attempt }}
          MAX_ATTEMPTS: ${{ steps.limits.outputs.max }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Bash,Read,Edit,Write,Grep,Glob"'
          prompt: |
            The TerraVault DevSecOps pipeline failed on PR #${{ github.event.pull_request.number }}.
            This is DevSecOps auto-fix attempt ${{ steps.limits.outputs.attempt }} of ${{ steps.limits.outputs.max }}.

            Read both files at the repo root:
              - `pipeline-report.md`     — human + LLM readable failure summary
              - `pipeline-metrics.json`  — structured per-check metrics
                                           (`checks[].kind`, `status`, `metrics`, `findings`)

            Auto-fix scope (in priority order):

              1. **Bandit (SAST)** — fix the underlying code pattern. Do NOT
                 silence findings with `# nosec` unless the finding is a
                 documented false positive AND you add a one-line justification
                 in the same commit.

              2. **Safety (dependency CVEs)** — bump the affected package in
                 `requirements.txt` / `requirements-dev.txt` to the lowest
                 patched version specified in the advisory. Never make major
                 version jumps that could break import contracts.

              3. **pytest** — fix the failing test or the code under test,
                 whichever matches the actual defect. Do not xfail / skip to
                 silence a real failure.

              4. **Coverage** — do not chase coverage in this pipeline; coverage
                 is enforced by the Quality Gate, not DevSecOps.

            Hard NO-FIX zones (leave a PR comment instead of editing):

              - **GitLeaks (secrets)** — a secret was committed. The fix is
                rotation, not deletion. Comment on the PR explaining which
                secret to rotate and where it currently lives. Do NOT silently
                delete or rewrite history.
              - **Trivy (Docker CVEs)** — base image / system package bumps
                need explicit human review. Comment with the proposed bump
                instead of editing the Dockerfile.
              - **TerraVault scan findings on `test_files/`** — these are
                intentionally vulnerable fixtures. Do not "fix" them; if they
                are mis-tagged, document why in a PR comment.

            Workflow:

              1. Diagnose every failing check from `pipeline-metrics.json`.
              2. For each in-scope finding, apply the minimal change set.
              3. Re-run the affected checks locally where possible:
                   bandit -r terravault/ --ini .bandit -ll
                   safety check
                   pytest -x --junit-xml=pytest-junit.xml
              4. Stage and commit:
                   git add -A
                   git commit -m "chore(devsecops): auto-fix attempt ${{ steps.limits.outputs.attempt }}"
                   git push origin HEAD:"$PR_BRANCH"

            Hard constraints:
              - Do NOT add features, refactors, or abstractions beyond what the
                failing checks require.
              - Do NOT weaken thresholds: never edit `.bandit`, `requirements*.txt`
                pins beyond the minimum patched version, `.github/workflows/*.yml`,
                or `scripts/pipeline_report.py`.
              - Do NOT add new dependencies to "fix" findings.
              - If a finding falls outside the auto-fix scope above, leave a
                PR comment explaining why and what a human should do.

      - name: Verify pipeline checks after auto-fix
        if: steps.limits.outputs.proceed == 'true'
        id: verify
        env:
          TERRAVAULT_API_KEY_HASH: "$2b$12$LJ3m9ZkRjWyEbhMxBqXvkuN/3QlGYbTEwHqMFEVBBxkLpN0uWxjAq"
          TERRAVAULT_ENVIRONMENT: development
          TERRAVAULT_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          TERRAVAULT_REDIS_URL: "redis://localhost:6379"
          TERRAVAULT_LOG_LEVEL: INFO
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set +e
          git pull --ff-only origin "$PR_BRANCH" || true
          mkdir -p _verify
          bandit -r terravault/ --ini .bandit -f json -o _verify/bandit-report.json -ll || true
          safety check --save-json _verify/safety-report.json || true
          pytest -q --junit-xml=_verify/pytest-junit.xml --cov=terravault --cov-report=xml:_verify/coverage.xml || true

          python scripts/pipeline_report.py \
            --input bandit-json=_verify/bandit-report.json \
            --input safety-json=_verify/safety-report.json \
            --input pytest-junit=_verify/pytest-junit.xml \
            --input coverage-xml=_verify/coverage.xml \
            --output-md pipeline-report-after-fix.md \
            --output-json pipeline-metrics-after-fix.json \
            --title "DevSecOps Pipeline Report (post auto-fix)" \
            --commit "$(git rev-parse HEAD)" \
            --pr "${{ github.event.pull_request.number }}"
          OVERALL=$(python -c "import json; print(json.load(open('pipeline-metrics-after-fix.json'))['overall'])")
          if [ "$OVERALL" = "pass" ]; then
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload post-fix consolidated report
        if: steps.limits.outputs.proceed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-report-after-fix
          path: |
            pipeline-report-after-fix.md
            pipeline-metrics-after-fix.json
          retention-days: 14

      - name: Comment on PR with auto-fix result
        if: steps.limits.outputs.proceed == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const fixed = '${{ steps.verify.outputs.fixed }}' === 'true';
            const attempt = '${{ steps.limits.outputs.attempt }}';
            const max     = '${{ steps.limits.outputs.max }}';
            const after = fs.existsSync('pipeline-report-after-fix.md')
              ? fs.readFileSync('pipeline-report-after-fix.md', 'utf8')
              : '_Post-fix report missing — see workflow logs._';
            const header = fixed
              ? `## ✅ Claude DevSecOps auto-fix succeeded (attempt ${attempt}/${max})`
              : `## ⚠️ DevSecOps pipeline still failing after auto-fix attempt ${attempt}/${max}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${header}\n\n${after}`,
            });

  # Recompute the ratchet baseline on master, reusing the coverage.xml the
  # `test` job already produced (no second pytest run). Commits .ratchet.json
  # only when a real metric moved — see scripts/ratchet.py cmd_update().
  ratchet-bump:
    name: Recompute ratchet baseline on master
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    concurrency:
      group: ratchet-bump-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.AUTO_FIX_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Download coverage from the test job
        uses: actions/download-artifact@v8
        with:
          name: test-reports
          path: .

      - name: Recompute ratchet baseline
        run: python scripts/ratchet.py --update

      - name: Commit baseline bump if changed
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_FIX_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "ratchet-bot[bot]"
          git config user.email "ratchet-bot[bot]@users.noreply.github.com"
          if git diff --quiet -- .ratchet.json; then
            echo "Baseline unchanged — nothing to commit."
            exit 0
          fi
          git add .ratchet.json
          coverage=$(python -c "import json; d=json.load(open('.ratchet.json')); print(d['coverage_pct'])")
          files=$(python -c "import json; d=json.load(open('.ratchet.json')); print(d['files_over_threshold'])")
          dupes=$(python -c "import json; d=json.load(open('.ratchet.json')); print(d['duplicate_blocks'])")
          git commit -m "chore(ratchet): bump baseline (cov=${coverage}% files=${files} dupes=${dupes})"
          git push origin HEAD:${GITHUB_REF#refs/heads/}

  # Optional: Deploy to staging (only on master push)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [security-scan, test, docker]
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Deploy notification
      run: |
        echo "🚀 Ready for staging deployment"
        echo "All security checks passed ✅"
