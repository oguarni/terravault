name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # SAST - Static Application Security Testing
    - name: Run Bandit (SAST)
      run: |
        pip install bandit
        bandit -r terrasafe/ --ini .bandit -f json -o bandit-report.json || true
        bandit -r terrasafe/ --ini .bandit -ll -f screen

    # Dependency vulnerability scanning
    - name: Safety Check
      run: |
        pip install safety
        safety check --json

    # Secret detection
    - name: GitLeaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Frontend SAST (njsscan)
      run: |
        pip install njsscan
        njsscan frontend/ || true

    - name: Frontend Linting (Prettier & ESLint)
      run: |
        npx prettier@3.1.0 --check "frontend/**/*.{js,html,css}" || true
        npx eslint@8.56.0 --no-eslintrc --env browser --parser-options=ecmaVersion:latest "frontend/js/**/*.js" || true

    - name: Upload security artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json

  # Unit and integration tests
  test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests
      env:
        TERRASAFE_API_KEY_HASH: "$2b$12$LJ3m9ZkRjWyEbhMxBqXvkuN/3QlGYbTEwHqMFEVBBxkLpN0uWxjAq"
        TERRASAFE_ENVIRONMENT: "development"
        TERRASAFE_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
        TERRASAFE_REDIS_URL: "redis://localhost:6379"
        TERRASAFE_LOG_LEVEL: "INFO"
      run: |
        pytest -v --cov=terrasafe --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  # Integration tests with actual scanning
  integration-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run TerraSafe composite action on test_files/
      id: terrasafe
      uses: ./.github/actions/terrasafe-scan
      with:
        terraform_dir: test_files
        threshold: "70"
        fail_on_high_risk: "false"
        github_token: ${{ secrets.GITHUB_TOKEN }}
        scan_changed_only: "false"
        post_comment: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('terrasafe-results.sarif') != ''
      continue-on-error: true
      with:
        sarif_file: terrasafe-results.sarif
        category: terrasafe-integration

    - name: Archive scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: scan-results
        path: |
          scan_output.json
          terrasafe-results.sarif
          scan_errors.log

  # Docker security and build
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t terrasafe:${{ github.sha }} .

    - name: Run Trivy on Docker image
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: 'terrasafe:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Test Docker container
      run: |
        docker run --rm -v $(pwd)/test_files:/app/test_files \
          terrasafe:${{ github.sha }} \
          python -m terrasafe.cli test_files/secure.tf

  # Optional: Deploy to staging (only on main branch)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [security-scan, test, docker]
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Deploy notification
      run: |
        echo "🚀 Ready for staging deployment"
        echo "All security checks passed ✅"
