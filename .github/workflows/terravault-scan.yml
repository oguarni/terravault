name: TerraVault Terraform Security Scan

on:
  workflow_call:
    inputs:
      terraform_dir:
        description: Directory containing Terraform files
        type: string
        required: false
        default: "."
      threshold:
        description: Risk score threshold (0-100)
        type: string
        required: false
        default: "70"
      fail_on_high_risk:
        description: Fail workflow if any file exceeds threshold
        type: string
        required: false
        default: "true"
      python_version:
        description: Python version to use
        type: string
        required: false
        default: "3.10"

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  terravault:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout TerraVault action
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: _terravault_action

      - name: Run TerraVault scan
        id: scan
        uses: ./_terravault_action/.github/actions/terravault-scan
        with:
          terraform_dir: ${{ inputs.terraform_dir }}
          threshold: ${{ inputs.threshold }}
          fail_on_high_risk: ${{ inputs.fail_on_high_risk }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          scan_changed_only: "true"
          post_comment: "true"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('terravault-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: terravault-results.sarif
          category: terravault

      - name: Set up Python for report generation
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Generate AI-readable scan report
        if: always() && hashFiles('scan_output.json') != ''
        id: scan_report
        run: |
          set +e
          python _terravault_action/scripts/pipeline_report.py \
            --input terravault-scan=scan_output.json \
            --input terravault-sarif=terravault-results.sarif \
            --output-md terravault-scan-report.md \
            --output-json terravault-scan-metrics.json \
            --title "TerraVault Scan Report" \
            --commit "${{ github.event.pull_request.head.sha || github.sha }}" \
            --pr "${{ github.event.pull_request.number }}"
          if [ -f terravault-scan-metrics.json ]; then
            OVERALL=$(python -c "import json; print(json.load(open('terravault-scan-metrics.json'))['overall'])")
            echo "overall_status=$OVERALL" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=error" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Comment on PR with consolidated scan report
        if: >
          always() &&
          github.event_name == 'pull_request' &&
          hashFiles('terravault-scan-report.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const overall = '${{ steps.scan_report.outputs.overall_status }}';
            const passed = overall === 'pass';
            const body = `<!-- terravault-scan-report -->\n## ${passed ? '✅' : '❌'} TerraVault scan ${passed ? 'passed' : 'failed'}\n\n${fs.readFileSync('terravault-scan-report.md', 'utf8')}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('<!-- terravault-scan-report -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terravault-scan-results
          path: |
            scan_output.json
            terravault-results.sarif
            scan_errors.log
            terravault-scan-report.md
            terravault-scan-metrics.json
          if-no-files-found: warn
