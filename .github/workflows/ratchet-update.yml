name: Ratchet Update

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '.ratchet.json'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ratchet-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Recompute baseline on master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.AUTO_FIX_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        env:
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          TERRAVAULT_API_KEY_HASH: "$2b$12$LJ3m9ZkRjWyEbhMxBqXvkuN/3QlGYbTEwHqMFEVBBxkLpN0uWxjAq"
          TERRAVAULT_ENVIRONMENT: development
          TERRAVAULT_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          TERRAVAULT_REDIS_URL: "redis://localhost:6379"
          TERRAVAULT_LOG_LEVEL: INFO
        run: |
          python -m pytest --cov=terravault --cov-report=xml -q

      - name: Recompute ratchet baseline
        run: python scripts/ratchet.py --update

      - name: Commit baseline bump if changed
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_FIX_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "ratchet-bot[bot]"
          git config user.email "ratchet-bot[bot]@users.noreply.github.com"
          if git diff --quiet -- .ratchet.json; then
            echo "Baseline unchanged — nothing to commit."
            exit 0
          fi
          git add .ratchet.json
          coverage=$(python -c "import json; d=json.load(open('.ratchet.json')); print(d['coverage_pct'])")
          files=$(python -c "import json; d=json.load(open('.ratchet.json')); print(d['files_over_threshold'])")
          dupes=$(python -c "import json; d=json.load(open('.ratchet.json')); print(d['duplicate_blocks'])")
          git commit -m "chore(ratchet): bump baseline (cov=${coverage}% files=${files} dupes=${dupes})"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
